openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CVE Daily Report API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cves
    description: CVE and vulnerability data
  - name: apple
    description: Apple iOS/iPadOS and macOS patch data (proxied from the ios-security-vulnerability-formatter service)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cves/daily:
    get:
      operationId: getDailyCves
      tags: [cves]
      summary: Get today's new CVEs
      description: Returns CVEs published in the last 24 hours from NVD, patched ones first
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [CRITICAL, HIGH, MEDIUM, LOW]
          description: Filter by CVSS severity
        - name: patchedOnly
          in: query
          required: false
          schema:
            type: boolean
          description: Return only CVEs with known patches
      responses:
        "200":
          description: List of CVEs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CveEntry"

  /cves/kev:
    get:
      operationId: getKevList
      tags: [cves]
      summary: Get CISA Known Exploited Vulnerabilities
      description: Returns actively exploited zero-days from CISA KEV catalog
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          description: Maximum number of entries to return
      responses:
        "200":
          description: List of known exploited vulnerabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KevEntry"

  /cves/changes:
    get:
      operationId: getCveChanges
      tags: [cves]
      summary: Get recent CVE state changes
      description: Returns the most recent tracked-field changes (severity, CVSS score, patch status, known-exploited status) recorded from successive weekly CVE fetches. Empty if no persistent store is configured.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of entries to return
        - name: field
          in: query
          required: false
          schema:
            type: string
            enum: [severity, cvssScore, hasKnownPatch, isKnownExploited]
          description: Filter to changes of a single tracked field
        - name: cveId
          in: query
          required: false
          schema:
            type: string
          description: Filter to changes for a single CVE
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of entries to skip, for pagination
      responses:
        "200":
          description: List of recent CVE state changes, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CveChange"

  /cves/search:
    get:
      operationId: getCvesSearch
      tags: [cves]
      summary: Search CVEs by ID, description, or vendor
      description: Full-text-ish search across persisted CVE snapshots (Postgres ILIKE). Falls back to filtering the current in-memory weekly cache when no persistent store is configured, in which case results are limited to the last 7 days.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search text, matched against CVE ID, description, and vendor
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Maximum number of entries to return
      responses:
        "200":
          description: Matching CVEs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CveEntry"

  /cves/trend:
    get:
      operationId: getCvesTrend
      tags: [cves]
      summary: Get extended historical CVE volume trend
      description: Returns per-day severity counts over a longer window than the 7-day weekly digest, derived from persisted CVE snapshots. Empty if no persistent store is configured or not enough history has accumulated yet.
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 30
          description: Number of trailing days to cover (clamped to 1-90)
      responses:
        "200":
          description: Daily severity counts, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTrend"

  /metrics:
    get:
      operationId: getMetrics
      tags: [health]
      summary: Get internal operational metrics
      description: Returns in-process cache hit/miss counters, last successful/failed fetch timestamps per upstream source, and Postgres write counters. For operational visibility, not end-user facing.
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metrics"

  /patch-tuesday/issues:
    get:
      operationId: getPatchTuesdayIssues
      tags: [patch-tuesday]
      summary: Get community-reported known issues for a Patch Tuesday release
      description: Aggregates RSS feeds from AskWoody, BornCity, and Windows-focused news sites for the given release window
      parameters:
        - name: releaseId
          in: query
          required: false
          schema:
            type: string
          description: Release ID (e.g. 2025-Jun). Defaults to latest.
      responses:
        "200":
          description: Known issues with fetch metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtIssuesResult"

  /patch-tuesday/releases:
    get:
      operationId: getPatchTuesdayReleases
      tags: [cves]
      summary: List recent Patch Tuesday releases
      description: Returns the last 12 monthly Patch Tuesday releases from MSRC
      responses:
        "200":
          description: List of releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatchTuesdayRelease"

  /patch-tuesday:
    get:
      operationId: getPatchTuesdayDigest
      tags: [cves]
      summary: Get Patch Tuesday CVEs for a release
      description: Returns full CVE list and summary for a Patch Tuesday release
      parameters:
        - name: releaseId
          in: query
          required: false
          schema:
            type: string
          description: "Release ID (e.g. 2024-Dec). Defaults to latest."
      responses:
        "200":
          description: Patch Tuesday digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchTuesdayDigest"

  /apple/patches:
    get:
      operationId: getApplePatches
      tags: [apple]
      summary: Get latest Apple iOS/iPadOS and macOS security releases
      description: Returns the latest security releases (version, release date, CVE count, actively-exploited flag) for both iOS/iPadOS and macOS, proxied from the ios-security-vulnerability-formatter service.
      responses:
        "200":
          description: Latest Apple release info per platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplePatchesResult"

  /apple/cves/{platform}/{version}:
    get:
      operationId: getAppleCves
      tags: [apple]
      summary: Get per-CVE detail for one specific Apple security release
      description: Returns per-CVE description, NVD link, actively-exploited flag, and version-specific annotation for the given (platform, version), as captured whenever that version was the current release. Empty if that version was never fetched (e.g. no persistent store configured and it isn't the live latest).
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [ios, macos]
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Per-CVE detail for the given release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppleCvesResult"

  /apple/history/{platform}:
    get:
      operationId: getAppleHistory
      tags: [apple]
      summary: Get historical Apple security releases
      description: Returns every distinct (platform, version) release api-server has ever seen for this platform, newest first — an accumulating changelog independent of the upstream tool, which only ever reports the current latest release(s). Empty if no persistent store is configured.
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [ios, macos]
      responses:
        "200":
          description: Release history, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppleHistoryResult"

  /apple/refresh:
    post:
      operationId: postAppleRefresh
      tags: [apple]
      summary: Force an immediate Apple patch data refresh
      description: Bypasses the daily 07:00 AEST schedule and fetches now. Rate-limited to once every 5 minutes — returns 429 with a retryAfterSeconds field if called again too soon.
      responses:
        "200":
          description: Refreshed release info per platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplePatchesResult"

  /cves/weekly:
    get:
      operationId: getWeeklyCves
      tags: [cves]
      summary: Get all CVEs from the past 7 days
      description: Returns the full list of CVEs published in the last 7 days, patched first
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [CRITICAL, HIGH, MEDIUM, LOW]
          description: Filter by CVSS severity
        - name: patchedOnly
          in: query
          required: false
          schema:
            type: boolean
          description: Return only CVEs with known patches
      responses:
        "200":
          description: List of CVEs from the past 7 days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CveEntry"

  /cves/digest:
    get:
      operationId: getWeeklyDigest
      tags: [cves]
      summary: Get weekly digest grouped by platform
      description: Returns the past 7 days of CVEs grouped by impacted platform/device type
      responses:
        "200":
          description: Weekly digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyDigest"

  /cves/summary:
    get:
      operationId: getCveSummary
      tags: [cves]
      summary: Get daily summary stats
      description: Returns aggregated stats for today's CVE report
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CveSummary"

  /cves/{cveId}:
    get:
      operationId: getCveById
      tags: [cves]
      summary: Get CVE details
      description: Returns detailed information for a specific CVE
      parameters:
        - name: cveId
          in: path
          required: true
          schema:
            type: string
          description: CVE ID (e.g. CVE-2024-12345)
      responses:
        "200":
          description: CVE detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CveDetail"
        "404":
          description: CVE not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CveEntry:
      type: object
      required:
        - cveId
        - description
        - publishedDate
        - lastModifiedDate
        - severity
        - hasKnownPatch
        - isKnownExploited
      properties:
        cveId:
          type: string
        description:
          type: string
        publishedDate:
          type: string
        lastModifiedDate:
          type: string
        severity:
          type: ["string", "null"]
          enum: [CRITICAL, HIGH, MEDIUM, LOW, null]
        cvssScore:
          type: ["number", "null"]
        cvssVector:
          type: ["string", "null"]
        hasKnownPatch:
          type: boolean
        isKnownExploited:
          type: boolean
        affectedProducts:
          type: array
          items:
            type: string
        patchUrls:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
        vendor:
          type: ["string", "null"]
        cweIds:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
            enum:
              - Windows
              - macOS
              - Linux
              - iOS
              - Android
              - Network
              - Server
              - Cloud
              - Browser
              - Firmware
              - Other
        deviceType:
          type: string
          enum:
            - Endpoint
            - Endpoint VM
            - Server
            - Network
            - Cloud
            - Mobile
            - Other

    KevEntry:
      type: object
      required:
        - cveId
        - vendorProject
        - product
        - vulnerabilityName
        - dateAdded
        - shortDescription
        - requiredAction
        - dueDate
        - knownRansomwareCampaignUse
        - patchable
        - platforms
      properties:
        cveId:
          type: string
        vendorProject:
          type: string
        product:
          type: string
        vulnerabilityName:
          type: string
        dateAdded:
          type: string
        shortDescription:
          type: string
        requiredAction:
          type: string
        dueDate:
          type: string
        knownRansomwareCampaignUse:
          type: string
        notes:
          type: ["string", "null"]
        severity:
          type: ["string", "null"]
          enum: [CRITICAL, HIGH, MEDIUM, LOW, null]
        cvssScore:
          type: ["number", "null"]
        patchable:
          type: boolean
          description: True when requiredAction indicates applying an update/patch exists
        platforms:
          type: array
          items:
            type: string
            enum:
              - Windows
              - macOS
              - Linux
              - iOS
              - Android
              - Network
              - Server
              - Cloud
              - Browser
              - Firmware
              - Other
        deviceType:
          type: string
          enum:
            - Endpoint
            - Endpoint VM
            - Server
            - Network
            - Cloud
            - Mobile
            - Other

    CveChange:
      type: object
      required:
        - cveId
        - field
        - changedAt
      properties:
        cveId:
          type: string
        field:
          type: string
          description: Name of the tracked field that changed (e.g. severity, cvssScore, hasKnownPatch, isKnownExploited)
        oldValue:
          type: ["string", "null"]
        newValue:
          type: ["string", "null"]
        changedAt:
          type: string

    CveDetail:
      type: object
      required:
        - cveId
        - description
        - publishedDate
        - lastModifiedDate
        - severity
        - hasKnownPatch
        - isKnownExploited
      properties:
        cveId:
          type: string
        description:
          type: string
        publishedDate:
          type: string
        lastModifiedDate:
          type: string
        severity:
          type: ["string", "null"]
          enum: [CRITICAL, HIGH, MEDIUM, LOW, null]
        cvssScore:
          type: ["number", "null"]
        cvssVector:
          type: ["string", "null"]
        hasKnownPatch:
          type: boolean
        isKnownExploited:
          type: boolean
        affectedProducts:
          type: array
          items:
            type: string
        patchUrls:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
        vendor:
          type: ["string", "null"]
        cweIds:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
            enum:
              - Windows
              - macOS
              - Linux
              - iOS
              - Android
              - Network
              - Server
              - Cloud
              - Browser
              - Firmware
              - Other
        kevDetails:
          $ref: "#/components/schemas/KevEntry"

    CveSummary:
      type: object
      required:
        - reportDate
        - totalNew
        - critical
        - high
        - medium
        - low
        - patched
        - unpatched
        - knownExploited
        - newKevEntries
        - topVendors
      properties:
        reportDate:
          type: string
        totalNew:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        patched:
          type: integer
        unpatched:
          type: integer
        knownExploited:
          type: integer
        newKevEntries:
          type: integer
        topVendors:
          type: array
          items:
            $ref: "#/components/schemas/VendorCount"

    VendorCount:
      type: object
      required:
        - vendor
        - count
      properties:
        vendor:
          type: string
        count:
          type: integer

    PtIssuesResult:
      type: object
      required: [issues, fetchedAt, windowStart, windowEnd, releaseId]
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/PtIssue"
        fetchedAt:
          type: string
        windowStart:
          type: string
        windowEnd:
          type: string
        releaseId:
          type: string

    PtIssue:
      type: object
      required: [id, title, url, source, sourceUrl, publishedDate, summary, category, affectedProducts]
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
        publishedDate:
          type: string
        summary:
          type: string
        category:
          type: string
          enum: [Regression, Bug, Advisory, Analysis, Workaround, Discussion]
        affectedProducts:
          type: array
          items:
            type: string

    AppleRelease:
      type: object
      required: [releaseDate, cveCount, activelyExploited]
      properties:
        version:
          type: ["string", "null"]
        updateName:
          type: ["string", "null"]
        releaseDate:
          type: string
        cveCount:
          type: integer
        securityInfoUrl:
          type: ["string", "null"]
        activelyExploited:
          type: boolean

    ApplePlatformDigest:
      type: object
      required: [platform, releasesFound, willCombine, releases]
      properties:
        platform:
          type: string
          enum: [ios, macos]
        releasesFound:
          type: integer
        willCombine:
          type: boolean
        releases:
          type: array
          items:
            $ref: "#/components/schemas/AppleRelease"

    ApplePatchesResult:
      type: object
      required: [platforms, fetchedAt]
      properties:
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/ApplePlatformDigest"
        fetchedAt:
          type: string

    AppleCve:
      type: object
      required: [cveId, description, activelyExploited, versionNote, nvdUrl]
      properties:
        cveId:
          type: string
        description:
          type: ["string", "null"]
        activelyExploited:
          type: boolean
        versionNote:
          type: ["string", "null"]
        nvdUrl:
          type: string

    AppleCvesResult:
      type: object
      required: [cves]
      properties:
        cves:
          type: array
          items:
            $ref: "#/components/schemas/AppleCve"

    AppleReleaseHistoryEntry:
      type: object
      required: [platform, version, updateName, releaseDate, cveCount, securityInfoUrl, activelyExploited, firstSeenAt, lastSeenAt]
      properties:
        platform:
          type: string
          enum: [ios, macos]
        version:
          type: string
        updateName:
          type: ["string", "null"]
        releaseDate:
          type: string
        cveCount:
          type: integer
        securityInfoUrl:
          type: ["string", "null"]
        activelyExploited:
          type: boolean
        firstSeenAt:
          type: string
        lastSeenAt:
          type: string

    AppleHistoryResult:
      type: object
      required: [history]
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/AppleReleaseHistoryEntry"

    PatchTuesdayRelease:
      type: object
      required: [id, title, releaseDate]
      properties:
        id:
          type: string
        title:
          type: string
        releaseDate:
          type: string

    PatchTuesdayCve:
      type: object
      required:
        - cveId
        - title
        - severity
        - isExploited
        - isPubliclyDisclosed
        - affectedProducts
        - kbArticles
        - patchUrls
      properties:
        cveId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: ["string", "null"]
        cvssScore:
          type: ["number", "null"]
        cvssVector:
          type: ["string", "null"]
        isExploited:
          type: boolean
        isPubliclyDisclosed:
          type: boolean
        affectedProducts:
          type: array
          items:
            type: string
        kbArticles:
          type: array
          items:
            type: string
        patchUrls:
          type: array
          items:
            type: string
        impactType:
          type: ["string", "null"]
        attackVector:
          type: ["string", "null"]

    PatchTuesdayDigest:
      type: object
      required:
        - releaseId
        - title
        - releaseDate
        - totalCves
        - critical
        - important
        - moderate
        - low
        - exploited
        - publiclyDisclosed
        - cves
      properties:
        releaseId:
          type: string
        title:
          type: string
        releaseDate:
          type: string
        totalCves:
          type: integer
        critical:
          type: integer
        important:
          type: integer
        moderate:
          type: integer
        low:
          type: integer
        exploited:
          type: integer
        publiclyDisclosed:
          type: integer
        cves:
          type: array
          items:
            $ref: "#/components/schemas/PatchTuesdayCve"

    DailyTrend:
      type: object
      required:
        - date
        - total
        - critical
        - high
        - medium
        - low
      properties:
        date:
          type: string
        total:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer

    PlatformGroup:
      type: object
      required:
        - platform
        - total
        - critical
        - high
        - medium
        - low
        - patched
        - unpatched
        - knownExploited
        - topCves
      properties:
        platform:
          type: string
        total:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        patched:
          type: integer
        unpatched:
          type: integer
        knownExploited:
          type: integer
        topCves:
          type: array
          items:
            $ref: "#/components/schemas/CveEntry"

    WeeklyDigest:
      type: object
      required:
        - startDate
        - endDate
        - totalCves
        - critical
        - high
        - patched
        - knownExploited
        - platformGroups
        - dailyTrend
      properties:
        startDate:
          type: string
        endDate:
          type: string
        totalCves:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        patched:
          type: integer
        knownExploited:
          type: integer
        platformGroups:
          type: array
          items:
            $ref: "#/components/schemas/PlatformGroup"
        dailyTrend:
          type: array
          items:
            $ref: "#/components/schemas/DailyTrend"

    MetricsLastFetch:
      type: object
      properties:
        daily:
          type: ["string", "null"]
        weekly:
          type: ["string", "null"]
        kev:
          type: ["string", "null"]
        ptReleases:
          type: ["string", "null"]
        ptDigest:
          type: ["string", "null"]

    MetricsLastError:
      type: object
      properties:
        daily:
          $ref: "#/components/schemas/MetricsErrorDetail"
        weekly:
          $ref: "#/components/schemas/MetricsErrorDetail"
        kev:
          $ref: "#/components/schemas/MetricsErrorDetail"
        ptReleases:
          $ref: "#/components/schemas/MetricsErrorDetail"
        ptDigest:
          $ref: "#/components/schemas/MetricsErrorDetail"

    MetricsErrorDetail:
      type: ["object", "null"]
      properties:
        message:
          type: string
        at:
          type: string

    MetricsDb:
      type: object
      required:
        - configured
        - writeSuccesses
        - writeFailures
      properties:
        configured:
          type: boolean
        writeSuccesses:
          type: integer
        writeFailures:
          type: integer

    Metrics:
      type: object
      required:
        - cacheHits
        - cacheMisses
        - lastFetch
        - lastError
